components:
  schemas:
    AttendanceCodeResponse:
      type: object
      properties:
        code:
          type: string
          description: 6-character alphanumeric session code
        expires_in:
          type: integer
          description: Seconds until the code expires (always 600)
      required:
      - code
      - expires_in
    AttendanceFailedResponse:
      type: object
      properties:
        detail:
          type: string
          description: One of "failed" or "already_marked"
      required:
      - detail
    AttendanceSerializers:
      type: object
      properties:
        student_id:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          readOnly: true
        is_present:
          type: boolean
        course_id:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        date:
          type: string
          format: date
          readOnly: true
        id:
          type: integer
          readOnly: true
      required:
      - course_id
      - created_at
      - date
      - id
      - student_id
    Course:
      type: object
      properties:
        course_code:
          type: string
          maxLength: 20
        course_name:
          type: string
          maxLength: 255
        description:
          type: string
        credit_hours:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        department:
          type: string
        semester:
          type: integer
          maximum: 14
          minimum: 1
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          readOnly: true
          nullable: true
      required:
      - course_code
      - course_name
      - created_at
      - created_by
      - credit_hours
      - department
      - semester
      - updated_at
    CreateAttendanceRequest:
      type: object
      properties:
        code:
          type: string
          description: The 6-character session code displayed by the faculty.
      required:
      - code
    Department:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        code:
          type: string
          maxLength: 20
        description:
          type: string
      required:
      - code
      - name
    Faculty:
      type: object
      properties:
        college_id:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          maxLength: 30
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        department:
          type: string
      required:
      - college_id
      - department
      - email
      - first_name
      - last_name
    PatchedCourse:
      type: object
      properties:
        course_code:
          type: string
          maxLength: 20
        course_name:
          type: string
          maxLength: 255
        description:
          type: string
        credit_hours:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
        department:
          type: string
        semester:
          type: integer
          maximum: 14
          minimum: 1
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          readOnly: true
          nullable: true
    PatchedDepartment:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        code:
          type: string
          maxLength: 20
        description:
          type: string
    PatchedFaculty:
      type: object
      properties:
        college_id:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          maxLength: 30
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        department:
          type: string
    PatchedPartialUpdateAttendanceRequest:
      type: object
      properties:
        is_present:
          type: boolean
          description: true = present, false = absent.
    PatchedStudent:
      type: object
      properties:
        college_id:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          maxLength: 30
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        department:
          type: string
        student_profile:
          $ref: '#/components/schemas/StudentProfile'
    Student:
      type: object
      properties:
        college_id:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          maxLength: 30
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        department:
          type: string
        student_profile:
          $ref: '#/components/schemas/StudentProfile'
      required:
      - college_id
      - department
      - email
      - first_name
      - last_name
      - student_profile
    StudentProfile:
      type: object
      properties:
        join_date_year:
          type: integer
          maximum: 9223372036854775807
          minimum: 0
          format: int64
          description: The calendar year the student enrolled, e.g. 2023
        gpa:
          type: string
          format: decimal
          pattern: ^-?\d{0,2}(?:\.\d{0,2})?$
          readOnly: true
          description: GPA on a 4.0 scale
      required:
      - gpa
      - join_date_year
    TokenBlacklist:
      type: object
      properties:
        refresh:
          type: string
          writeOnly: true
      required:
      - refresh
    TokenObtainPair:
      type: object
      properties:
        college_id:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - college_id
      - password
      - refresh
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
    User:
      type: object
      properties:
        college_id:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          maxLength: 30
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        department:
          type: string
      required:
      - college_id
      - department
      - email
      - first_name
      - last_name
    UserProfile:
      oneOf:
      - $ref: '#/components/schemas/Student'
      - $ref: '#/components/schemas/Faculty'
      - $ref: '#/components/schemas/User'
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
