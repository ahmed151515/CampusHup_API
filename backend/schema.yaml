openapi: 3.0.3
info:
  title: Campus Hub API
  version: 1.0.0
  description: Campus Hub Backend API
paths:
  /api/schema/:
    get:
      operationId: api_schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - af
          - ar
          - ar-dz
          - ast
          - az
          - be
          - bg
          - bn
          - br
          - bs
          - ca
          - ckb
          - cs
          - cy
          - da
          - de
          - dsb
          - el
          - en
          - en-au
          - en-gb
          - eo
          - es
          - es-ar
          - es-co
          - es-mx
          - es-ni
          - es-ve
          - et
          - eu
          - fa
          - fi
          - fr
          - fy
          - ga
          - gd
          - gl
          - he
          - hi
          - hr
          - hsb
          - ht
          - hu
          - hy
          - ia
          - id
          - ig
          - io
          - is
          - it
          - ja
          - ka
          - kab
          - kk
          - km
          - kn
          - ko
          - ky
          - lb
          - lt
          - lv
          - mk
          - ml
          - mn
          - mr
          - ms
          - my
          - nb
          - ne
          - nl
          - nn
          - os
          - pa
          - pl
          - pt
          - pt-br
          - ro
          - ru
          - sk
          - sl
          - sq
          - sr
          - sr-latn
          - sv
          - sw
          - ta
          - te
          - tg
          - th
          - tk
          - tr
          - tt
          - udm
          - ug
          - uk
          - ur
          - uz
          - vi
          - zh-hans
          - zh-hant
      tags:
      - api
      security:
      - jwtAuth: []
      - BearerAuth: []
      - {}
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/{course_code}/attendance/:
    get:
      operationId: api_v1_attendance_list
      description: Returns every record for the course. **Access:** Faculty of the
        course or admin.
      summary: List all attendance records for a course
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        required: true
      tags:
      - Attendance
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttendanceSerializers'
          description: ''
        '403':
          description: Forbidden – not faculty or admin.
    post:
      operationId: api_v1_attendance_create
      description: Enrolled student submits the 6-char faculty-generated code to be
        marked present. Returns ``failed`` (no/wrong code) or ``already_marked`` (duplicate)
        on error.
      summary: Mark attendance using a session code
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        description: The unique course code.
        required: true
      tags:
      - Attendance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttendanceRequest'
            examples:
              ValidCodeSubmission:
                value:
                  code: a3f9c1
                summary: Valid code submission
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CreateAttendanceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateAttendanceRequest'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceSerializers'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceFailedResponse'
              examples:
                AlreadyMarkedToday:
                  value:
                    detail: already_marked
                  summary: Already marked today
          description: '``detail``: "failed" (invalid code) or "already_marked" (duplicate).'
        '403':
          description: Forbidden – not an enrolled student.
  /api/v1/{course_code}/attendance/{id}/:
    patch:
      operationId: api_v1_attendance_partial_update
      description: Faculty manually sets ``is_present`` on a record. Only ``is_present``
        is accepted.
      summary: Override a student's attendance status
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        description: The unique course code.
        required: true
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this attendance.
        required: true
      tags:
      - Attendance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedPartialUpdateAttendanceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedPartialUpdateAttendanceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedPartialUpdateAttendanceRequest'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceSerializers'
          description: ''
        '403':
          description: Forbidden – not faculty of this course.
        '404':
          description: No attendance record with the given pk.
  /api/v1/{course_code}/attendance/code/:
    get:
      operationId: api_v1_attendance_code_retrieve
      description: Returns the active 6-char code for the course (TTL 600 s). Creates
        one on cache miss; resets TTL on cache hit. **Access:** Faculty only.
      summary: Get or renew the session attendance code
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        description: The unique course code.
        required: true
      tags:
      - Attendance
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceCodeResponse'
              examples:
                SuccessfulCodeResponse:
                  value:
                    code: a3f9c1
                    expires_in: 600
                  summary: Successful code response
          description: ''
        '403':
          description: Forbidden – not faculty of this course.
  /api/v1/{course_code}/attendance/me/:
    get:
      operationId: api_v1_attendance_me_list
      description: Returns only the current student's records for this course. **Access:**
        Enrolled students only.
      summary: Get the authenticated student's own attendance history
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        description: The unique course code.
        required: true
      tags:
      - Attendance
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AttendanceSerializers'
          description: ''
        '403':
          description: Forbidden – not an enrolled student.
  /api/v1/{course_code}/quiz/:
    get:
      operationId: api_v1_quiz_list
      description: |-
        Quiz management for a course.

        Views are thin: authentication + permission checks + delegation to model methods.
        All business logic lives in QuizSubmission model methods.
      summary: List quizzes for a course
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        required: true
      tags:
      - quiz
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuizList'
          description: ''
    post:
      operationId: api_v1_quiz_create
      description: |-
        Quiz management for a course.

        Views are thin: authentication + permission checks + delegation to model methods.
        All business logic lives in QuizSubmission model methods.
      summary: Create a quiz with nested questions
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        required: true
      tags:
      - quiz
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizCreateUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/QuizCreateUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/QuizCreateUpdate'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizCreateUpdate'
          description: ''
  /api/v1/{course_code}/quiz/{id}/:
    get:
      operationId: api_v1_quiz_retrieve
      description: |-
        Quiz management for a course.

        Views are thin: authentication + permission checks + delegation to model methods.
        All business logic lives in QuizSubmission model methods.
      summary: Retrieve a quiz with its questions
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - quiz
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizDetail'
          description: ''
    put:
      operationId: api_v1_quiz_update
      description: |-
        Quiz management for a course.

        Views are thin: authentication + permission checks + delegation to model methods.
        All business logic lives in QuizSubmission model methods.
      summary: Replace a quiz (blocked if submissions exist)
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - quiz
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizCreateUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/QuizCreateUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/QuizCreateUpdate'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizCreateUpdate'
          description: ''
    patch:
      operationId: api_v1_quiz_partial_update
      description: |-
        Quiz management for a course.

        Views are thin: authentication + permission checks + delegation to model methods.
        All business logic lives in QuizSubmission model methods.
      summary: Partially update a quiz (blocked if submissions exist)
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - quiz
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedQuizCreateUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedQuizCreateUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedQuizCreateUpdate'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizCreateUpdate'
          description: ''
    delete:
      operationId: api_v1_quiz_destroy
      description: |-
        Quiz management for a course.

        Views are thin: authentication + permission checks + delegation to model methods.
        All business logic lives in QuizSubmission model methods.
      summary: Delete a quiz (blocked if submissions exist)
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - quiz
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/{course_code}/quiz/{id}/my-grade/:
    get:
      operationId: api_v1_quiz_my_grade_retrieve
      description: Student retrieves their own submission and grade breakdown.
      summary: Get own grade (student)
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - quiz
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizDetail'
          description: ''
  /api/v1/{course_code}/quiz/{id}/start/:
    post:
      operationId: api_v1_quiz_start_create
      description: |-
        Student starts a quiz. Creates a QuizSubmission and records started_at.
        Idempotent — multiple calls return the same submission without error.
      summary: Start a quiz (records start time)
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - quiz
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizDetail'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/QuizDetail'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/QuizDetail'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizDetail'
          description: ''
  /api/v1/{course_code}/quiz/{id}/submissions/:
    get:
      operationId: api_v1_quiz_submissions_retrieve
      description: Faculty / admin views all submissions with scores for a quiz.
      summary: List all student submissions (faculty/admin)
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - quiz
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizDetail'
          description: ''
  /api/v1/{course_code}/quiz/{id}/submit/:
    post:
      operationId: api_v1_quiz_submit_create
      description: |-
        Student submits answers. Delegates all logic to QuizSubmission.submit().

        Handles edge cases:
        - Submit without calling /start/ first → auto-records started_at.
        - Already submitted → 400.
        - Time expired → 400.
        - Partial answers → accepted.
      summary: Submit quiz answers (auto-graded, time-enforced)
      parameters:
      - in: path
        name: course_code
        schema:
          type: string
        required: true
      - in: path
        name: id
        schema:
          type: string
        required: true
      tags:
      - quiz
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuizSubmit'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/QuizSubmit'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/QuizSubmit'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizDetail'
          description: ''
  /api/v1/accounts/departments/:
    get:
      operationId: api_v1_accounts_departments_list
      description: Returns all departments ordered by name. **Access:** Any authenticated
        user.
      summary: List all departments
      tags:
      - Departments
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Department'
          description: ''
    post:
      operationId: api_v1_accounts_departments_create
      description: Creates a new department. **Access:** Admin only.
      summary: Create a department
      tags:
      - Departments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Department'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Department'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Department'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
        '400':
          description: Validation error – missing or duplicate fields.
        '403':
          description: Forbidden – admin role required.
  /api/v1/accounts/departments/{code}/:
    get:
      operationId: api_v1_accounts_departments_retrieve
      description: Returns a single department by its unique ``code``. **Access:**
        Any authenticated user.
      summary: Retrieve a department
      parameters:
      - in: path
        name: code
        schema:
          type: string
        description: The unique department code (e.g. ``CS``).
        required: true
      tags:
      - Departments
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
        '404':
          description: No department with the given code.
    put:
      operationId: api_v1_accounts_departments_update
      description: Full update of a department record. **Access:** Admin only.
      summary: Replace a department
      parameters:
      - in: path
        name: code
        schema:
          type: string
        description: The unique department code.
        required: true
      tags:
      - Departments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Department'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Department'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Department'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
        '400':
          description: Validation error.
        '403':
          description: Forbidden – admin role required.
        '404':
          description: No department with the given code.
    patch:
      operationId: api_v1_accounts_departments_partial_update
      description: Updates one or more fields of a department. **Access:** Admin only.
      summary: Partially update a department
      parameters:
      - in: path
        name: code
        schema:
          type: string
        description: The unique department code.
        required: true
      tags:
      - Departments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedDepartment'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedDepartment'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedDepartment'
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Department'
          description: ''
        '400':
          description: Validation error.
        '403':
          description: Forbidden – admin role required.
        '404':
          description: No department with the given code.
    delete:
      operationId: api_v1_accounts_departments_destroy
      description: Permanently deletes a department. **Access:** Admin only.
      summary: Delete a department
      parameters:
      - in: path
        name: code
        schema:
          type: string
        description: The unique department code.
        required: true
      tags:
      - Departments
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '204':
          description: Department deleted successfully.
        '403':
          description: Forbidden – admin role required.
        '404':
          description: No department with the given code.
  /api/v1/accounts/faculty/:
    get:
      operationId: api_v1_accounts_faculty_list
      description: Returns a paginated list of all **active** faculty accounts. Requires
        administrator privileges.
      summary: List all faculty members
      tags:
      - Faculty
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Faculty'
          description: ''
    post:
      operationId: api_v1_accounts_faculty_create
      description: Creates a new faculty account together with its associated `faculty_profile`.
        Password is auto-generated by the custom manager. Requires administrator privileges.
      summary: Create a faculty member
      tags:
      - Faculty
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Faculty'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Faculty'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Faculty'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Faculty'
          description: ''
        '400':
          description: Validation error
  /api/v1/accounts/faculty/{college_id}/:
    get:
      operationId: api_v1_accounts_faculty_retrieve
      description: Returns the full profile of a single faculty member identified
        by their `college_id`. Requires administrator privileges.
      summary: Retrieve a faculty member
      parameters:
      - in: path
        name: college_id
        schema:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
        required: true
      tags:
      - Faculty
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Faculty'
          description: ''
        '404':
          description: Faculty member not found
    put:
      operationId: api_v1_accounts_faculty_update
      description: Fully replaces all writable fields on a faculty member and their
        `faculty_profile`. Requires administrator privileges.
      summary: Update a faculty member (full)
      parameters:
      - in: path
        name: college_id
        schema:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
        required: true
      tags:
      - Faculty
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Faculty'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Faculty'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Faculty'
        required: true
      security:
      - jwtAuth: []
      - BearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Faculty'
          description: ''
        '400':
          description: Validation error
        '404':
          description: Faculty member not found
    patch:
      operationId: api_v1_accounts_faculty_partial_update
      description: Partially updates one or more fields on a faculty member and/or
        their `faculty_profile`. All fields are optional. Requires administrator privileges.
