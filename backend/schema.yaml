components:
  schemas:
    AttendanceCodeResponse:
      type: object
      properties:
        code:
          type: string
          description: 6-character alphanumeric session code
        expires_in:
          type: integer
          description: Seconds until the code expires (always 600)
      required:
      - code
      - expires_in
    AttendanceFailedResponse:
      type: object
      properties:
        detail:
          type: string
          description: One of "failed" or "already_marked"
      required:
      - detail
    AttendanceSerializers:
      type: object
      properties:
        student_id:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          readOnly: true
        is_present:
          type: boolean
        course_id:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        date:
          type: string
          format: date
          readOnly: true
        id:
          type: integer
          readOnly: true
      required:
      - course_id
      - created_at
      - date
      - id
      - student_id
    CorrectChoiceEnum:
      enum:
      - 1
      - 2
      - 3
      - 4
      type: integer
      description: |-
        * `1` - Choice 1
        * `2` - Choice 2
        * `3` - Choice 3
        * `4` - Choice 4
    Course:
      type: object
      properties:
        course_code:
          type: string
          maxLength: 20
        course_name:
          type: string
          maxLength: 255
        description:
          type: string
        credit_hours:
          type: integer
          maximum: 2147483647
          minimum: 0
        department:
          type: string
        semester:
          type: integer
          maximum: 14
          minimum: 1
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          readOnly: true
          nullable: true
      required:
      - course_code
      - course_name
      - created_at
      - created_by
      - credit_hours
      - department
      - semester
      - updated_at
    CreateAttendanceRequest:
      type: object
      properties:
        code:
          type: string
          description: The 6-character session code displayed by the faculty.
      required:
      - code
    Department:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        code:
          type: string
          maxLength: 20
        description:
          type: string
      required:
      - code
      - name
    Faculty:
      type: object
      properties:
        college_id:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          maxLength: 30
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        department:
          type: string
      required:
      - college_id
      - department
      - email
      - first_name
      - last_name
    PatchedCourse:
      type: object
      properties:
        course_code:
          type: string
          maxLength: 20
        course_name:
          type: string
          maxLength: 255
        description:
          type: string
        credit_hours:
          type: integer
          maximum: 2147483647
          minimum: 0
        department:
          type: string
        semester:
          type: integer
          maximum: 14
          minimum: 1
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        created_by:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          readOnly: true
          nullable: true
    PatchedDepartment:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        code:
          type: string
          maxLength: 20
        description:
          type: string
    PatchedFaculty:
      type: object
      properties:
        college_id:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          maxLength: 30
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        department:
          type: string
    PatchedPartialUpdateAttendanceRequest:
      type: object
      properties:
        is_present:
          type: boolean
          description: true = present, false = absent.
    PatchedQuizCreateUpdate:
      type: object
      description: |-
        Writable serializer for faculty creating or updating a quiz.
        Accepts nested questions with correct_choice.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        duration_minutes:
          type: integer
          maximum: 2147483647
          minimum: 1
          description: Time limit in minutes — enforced server-side.
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionWrite'
    PatchedStudent:
      type: object
      properties:
        college_id:
          type: string
          description: 'Student: 202603001 | Faculty: DR001 | Admin: ADMIN01'
          maxLength: 30
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        email:
          type: string
          format: email
          title: Email address
          maxLength: 254
        department:
          type: string
        student_profile:
          $ref: '#/components/schemas/StudentProfile'
    Question:
      type: object
      description: |-
        Read-only serializer for students.
        Deliberately excludes `correct_choice` to prevent answer leaking.
      properties:
        id:
          type: integer
          readOnly: true
        text:
          type: string
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Display sequence — lower values appear first.
        marks:
          type: integer
          maximum: 2147483647
          minimum: 1
          description: Points awarded for a correct answer.
        choice_1:
          type: string
          maxLength: 500
        choice_2:
          type: string
          maxLength: 500
        choice_3:
          type: string
          maxLength: 500
        choice_4:
          type: string
          maxLength: 500
      required:
      - choice_1
      - choice_2
      - choice_3
      - choice_4
      - id
      - text
    QuestionWrite:
      type: object
      description: |-
        Write serializer used by faculty when creating / updating a quiz.
        Includes `correct_choice` because only faculty/admin can write.
      properties:
        id:
          type: integer
          readOnly: true
        text:
          type: string
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
          description: Display sequence — lower values appear first.
        marks:
          type: integer
          maximum: 2147483647
          minimum: 1
          description: Points awarded for a correct answer.
        choice_1:
          type: string
          maxLength: 500
        choice_2:
          type: string
          maxLength: 500
        choice_3:
          type: string
          maxLength: 500
        choice_4:
          type: string
          maxLength: 500
        correct_choice:
          allOf:
          - $ref: '#/components/schemas/CorrectChoiceEnum'
          description: |-
            The number (1-4) of the correct choice.

            * `1` - Choice 1
            * `2` - Choice 2
            * `3` - Choice 3
            * `4` - Choice 4
          minimum: 0
          maximum: 2147483647
      required:
      - choice_1
      - choice_2
      - choice_3
      - choice_4
      - correct_choice
      - id
      - text
    QuizCreateUpdate:
      type: object
      description: |-
        Writable serializer for faculty creating or updating a quiz.
        Accepts nested questions with correct_choice.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        duration_minutes:
          type: integer
          maximum: 2147483647
          minimum: 1
          description: Time limit in minutes — enforced server-side.
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionWrite'
      required:
      - duration_minutes
      - id
      - questions
      - title
    QuizDetail:
      type: object
      description: Full detail — nested questions without correct_choice (student-safe).
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        duration_minutes:
          type: integer
          maximum: 2147483647
          minimum: 1
          description: Time limit in minutes — enforced server-side.
        questions:
          type: array
          items:
            $ref: '#/components/schemas/Question'
          readOnly: true
      required:
      - duration_minutes
      - id
      - questions
      - title
    QuizList:
      type: object
      description: Compact listing — shows question count instead of full nested list.
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        description:
          type: string
        duration_minutes:
          type: integer
          maximum: 2147483647
          minimum: 1
          description: Time limit in minutes — enforced server-side.
        question_count:
          type: integer
          readOnly: true
      required:
